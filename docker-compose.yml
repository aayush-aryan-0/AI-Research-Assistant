services:
  db:
    image: postgres:18-alpine
    restart: always
    shm_size: 128mb
    environment:
      POSTGRES_USER: aayush_ar
      POSTGRES_PASSWORD: "@my_secert_password_1958"
      POSTGRES_DB: ai_research_assistant_db
    volumes:
      - postgres_data:/var/lib/postgresql    
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myuser -d mydb"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./Backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://aayush_ar:%40my_secert_password_1958@localhost:5432/ai_research_assistant_db
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./Frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - backend

volumes:
  postgres_data: